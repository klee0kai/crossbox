name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Test with Gradle
        run: ./gradlew check --stacktrace
        env:
          SECRETS_GH_ACTOR: ${{ github.SECRETS_GH_ACTOR }}
          SECRETS_GH_API_TOKEN: ${{ secrets.SECRETS_GH_API_TOKEN }}
