name: Deploy Release

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  publish_github_packages:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          SECRETS_GH_ACTOR: ${{ github.SECRETS_GH_ACTOR }}
          SECRETS_GH_API_TOKEN: ${{ secrets.SECRETS_GH_API_TOKEN }}
